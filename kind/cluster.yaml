# 3-node local cluster for PDB + PVC + drain demo (1 control-plane + 2 workers).
#
# Create with:
#   make cluster
#
# kind ships a default StorageClass (standard) backed by local-path-provisioner.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: pdb-pvc-demo
nodes:
  - role: control-plane
  - role: worker
  - role: worker
