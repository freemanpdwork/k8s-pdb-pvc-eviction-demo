# 4-node local cluster for PDB + PVC + drain demo (1 control-plane + 3 workers).
#
# Create with:
#   make cluster
#
# kind ships a default StorageClass (standard) backed by local-path-provisioner.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: pdb-pvc-demo
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
  - role: worker
  - role: worker
  - role: worker
